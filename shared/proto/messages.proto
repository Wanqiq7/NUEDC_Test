syntax = "proto3";

message TaskWaypointMessage {
  string id = 1;
  uint32 sequence_index = 2;
  double x = 3;
  double y = 4;
  double z = 5;
  string action = 6;
  string payload_json = 7;
}

message TaskPlanMessage {
  string task_id = 1;
  string task_type = 2;
  string start_waypoint_id = 3;
  string terminal_waypoint_id = 4;
  repeated TaskWaypointMessage waypoints = 5;
  string metadata_json = 6;
}

message TaskEventMessage {
  string task_id = 1;
  string event_type = 2;
  uint32 sequence_index = 3;
  string waypoint_id = 4;
  string payload_json = 5;
}

message TaskSummaryMessage {
  string task_id = 1;
  string task_type = 2;
  bool success = 3;
  uint32 visited_waypoints = 4;
  string payload_json = 5;
}

message Ack {
  bool success = 1;
  string message = 2;
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_START_MISSION = 1;
  COMMAND_TYPE_STOP_MISSION = 2;
  COMMAND_TYPE_PING = 3;
}

message ControlCommand {
  CommandType type = 1;
  string task_id = 2;
}

message Envelope {
  uint64 sequence = 1;
  int64 timestamp_ms = 2;

  oneof payload {
    TaskPlanMessage task_plan = 10;
    TaskEventMessage task_event = 11;
    TaskSummaryMessage task_summary = 12;
    TaskPlanMessage mission_load = 13;
    Ack ack = 14;
    ControlCommand control_command = 15;
  }
}
